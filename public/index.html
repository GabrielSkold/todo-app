<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App | MongoDB + Express</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="index.js"></script>
</head>
<body>
    <header class="app-header">
        <h1>Todo App</h1>
        <p class="app-description">
        Simple full-stack todo application built with Express.js and MongoDB.
        Create, update, and delete tasks using a REST API.
        </p>
    </header>
    
    <main class="todo-container">
        <h2>Add chores</h2>
        <form class="todo-form">
            <input class="todo-input" type="text" autocomplete="off">
            <button class="add-btn">Add</button>
        </form>
        <ul class="todo-list"></ul>
    </main>

    <footer>
        <p>Built by <b>Gabriel Sköld</b></p>
    </footer>
</body>
</html>
